# Static site — no build step, serve files from the repo root.
[build]
  publish = "."

# Baseline security headers for all responses.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Always re-fetch HTML so Noah always gets the newest version.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# JS/CSS can be cached for a day (no content hashing in filenames).
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"
